<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="QuizMaster: interactive quiz game" />
  <title>QuizMaster</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
</head>

<body>
  <div class="app-container">
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle Theme">
      <div class="toggle-track">
        <div class="toggle-thumb">
          <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5" />
            <path
              d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
          </svg>
          <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
        </div>
      </div>
    </button>

    <!-- ======== START SCREEN ======== -->
    <div class="screen active" id="start-screen">
      <div class="header-content">
        <div class="app-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z" />
            <path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z" />
            <path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4" />
            <path d="M17.599 6.5a3 3 0 0 0 .399-1.375" />
            <path d="M6.003 5.125A3 3 0 0 0 6.401 6.5" />
            <path d="M3.477 10.896a4 4 0 0 1 .585-.396" />
            <path d="M19.938 10.5a4 4 0 0 1 .585.396" />
            <path d="M6 18a4 4 0 0 1-1.967-.516" />
            <path d="M19.967 17.484A4 4 0 0 1 18 18" />
          </svg>
        </div>
        <h1>Quiz<span>Master</span></h1>
        <p>Pick a category and test your knowledge. 15 seconds<br>per question — no pressure! 🎯</p>
      </div>

      <div class="category-grid" id="category-grid">
        <button class="category-card" data-category="science" style="--card-color: #1ea3ec;">
          <img class="card-bg-img" src="science.png" alt="Science Background" />
        </button>
        <button class="category-card" data-category="history" style="--card-color: #f7701e;">
          <img class="card-bg-img" src="history.png" alt="History Background" />
        </button>
        <button class="category-card" data-category="geography" style="--card-color: #2bca57;">
          <img class="card-bg-img" src="geography.png" alt="Geography Background" />
        </button>
        <button class="category-card" data-category="entertainment" style="--card-color: #e34e9e;">
          <img class="card-bg-img" src="entertainment.png" alt="Entertainment Background" />
        </button>
      </div>
    </div>

    <!-- ======== QUIZ SCREEN ======== -->
    <div class="screen" id="quiz-screen">
      <div class="quiz-top-bar">
        <button id="reset-btn" class="text-btn">↺ Reset</button>
        <div id="quiz-category-display" class="category-display">🔬 Science</div>
        <div class="timer-circle">
          <svg viewBox="0 0 36 36" class="circular-chart">
            <path class="circle-bg" d="M18 2.0845
                a 15.9155 15.9155 0 0 1 0 31.831
                a 15.9155 15.9155 0 0 1 0 -31.831" />
            <path class="circle" id="timer-circle-path" stroke-dasharray="100, 100" stroke-dashoffset="0" d="M18 2.0845
                a 15.9155 15.9155 0 0 1 0 31.831
                a 15.9155 15.9155 0 0 1 0 -31.831" />
          </svg>
          <div id="timer-value" class="timer-text">15</div>
        </div>
      </div>

      <div class="progress-section">
        <div class="progress-bar-container">
          <div id="progress" class="progress-fill"></div>
        </div>
        <p class="progress-text">Question <span id="current-question">1</span> of <span id="total-questions">5</span>
        </p>
      </div>

      <div class="question-container">
        <h2 id="question-text">What planet is known as the Red Planet?</h2>
      </div>

      <div id="answers-container" class="answers-grid">
        <!-- Answers -->
      </div>
    </div>

    <!-- ======== RESULT SCREEN ======== -->
    <div id="result-screen" class="screen">
      <div class="result-header">
        <div class="trophy-icon">🏆</div>
        <h1 id="result-title">Amazing!</h1>
        <div id="result-category-display" class="category-display">🔬 Science</div>
      </div>

      <div class="score-card">
        <div class="score-main">
          <span id="final-score" class="score-highlight">4</span><span class="score-total">/5</span>
        </div>
        <div class="score-label">correct answers</div>
        <div class="accuracy-bar-container">
          <div id="accuracy-fill" class="accuracy-fill"></div>
        </div>
        <div id="accuracy-text" class="accuracy-text">80% accuracy</div>
      </div>

      <button id="restart-btn" class="primary-btn">↺ Play Again</button>
    </div>

  </div>
  <script src="script.js"></script>
</body>

</html>
